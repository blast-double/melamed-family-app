# --- CPA notes ---
# Inline notes displayed on the transaction verification dashboard.
# Keyed by category name. Shown next to the category row for CPA context.

cpa_notes:
  "Keynote - Software": "Unreimbursed Keynote expense — Aaron deducts on Schedule C personally to avoid QB overhead."
  "Rent": "Includes $150/mo Florida checks + Mexico City rent below."

# --- Manual adjustments ---
# Expenses not in Monarch that the CPA needs. Injected into JSON output.
manual_adjustments:
  schedule_c_home_office:
    - name: "Rent — Mexico City (540k MXN)"
      total: -31427.91
      count: 6
      note: "540,000 MXN paid via 6 FX wires from Schwab XXX117. Actual USD wire amounts used. See Schwab_XXX117_Honey_2025_Categorized.md for dates."
    - name: "Internet — Mexico City (1,200 MXN/mo)"
      total: -721.13
      count: 12
      note: "14,400 MXN converted at monthly Fed Reserve average rates. Avg effective rate: 19.97 MXN/USD."
  "Business Travel & Meals": "50% deductible per IRC §274. All meals with clients/partners where business was discussed."
  "Health Insurance": "Self-employed health insurance deduction (Cigna). Aaron pays personally, no employer coverage."
  "Rental Income": "1771 11th Ave SF. ProPay deposits from tenants."
  "Keynote Income": "Passthrough LLC distributions — reconcile against K-1, not these bank deposits. Do not double-count with K-1 income."
  "Other Income": "Lending Club interest — CPA reconciles against 1099."

# --- Plausibility checks (Signal 7) ---
# Flag transactions where merchant doesn't match category.
# These set needs_review=True — they do NOT auto-recategorize.

plausibility:
  # Known Mexico City home office utility merchants.
  # Any "Gas & Electric" or "Internet & Cable" transaction NOT from these → flagged.
  home_office_utility_merchants:
    - "naturgymexi"
    - "naturgy"
    - "telmex"
    - "izzi"
    - "cfe"
    - "totalplay"
    - "pg&e"
    - "bilt"
    - "verizon"
    - "godaddy"
    - "ciudad de mexico"

  # Generic payment platforms — these are payment rails, not merchants.
  # When assigned to specific expense categories (maintenance, contractors), flag.
  generic_payment_platforms:
    - "zelle"
    - "venmo"
    - "paypal"
    - "cash app"
    - "square cash"
    - "wise"

  # POS terminal prefixes — the real merchant is after the * or space.
  # When these appear as merchant names categorized as "Software", it's always wrong.
  # SumUp, Square, Stripe are payment terminals, not software companies.
  pos_terminal_prefixes:
    - "sumup*"
    - "sumup "
    - "sq *"
    - "square*"
    - "stripe*"
    - "billpocket*"
    - "clip mx"
    - "netpay*"
    - "netpay "
    - "bzpaymx*"
    - "bzpaymx "
    - "merpago*"
    - "pointmp "

  # Income/ambiguous categories where a payment platform as merchant is suspicious.
  # Maintenance categories are excluded — Zelle payments to contractors are normal.
  expense_categories_requiring_merchant:
    - "Business Income"
    - "Other Income"
    - "Keynote Income"
    - "Business Utilities & Communication"
    - "Office Supplies"

  # Foreign country codes at end of merchant name.
  # Home office utilities should be Mexico only.
  foreign_country_codes:
    - "bra"
    - "arg"
    - "col"
    - "per"
    - "chl"
    - "usa"
    - "gbr"
    - "fra"
    - "ita"
    - "esp"
    - "deu"

# --- Auto-categorization rules ---
# These re-categorize transactions in Monarch based on patterns.
# Applied during /train-categories. First match wins.

rules:
  # Batch 1 — Uncategorized (2025-03-29)
  - match: { merchant_contains: "apple", account_contains: "Freedom Unlimited" }
    set_category: "Software"
    schedule: schedule_c
    confidence: high
    learned_from: "batch_1_2025-03-29"

  - match: { merchant_contains: "fielmann" }
    set_category: "Eyecare"
    schedule: personal
    confidence: high
    learned_from: "batch_1_2025-03-29"

  - match: { merchant_contains: "expressvpn" }
    set_category: "Keynote - Software"
    schedule: schedule_c
    confidence: high
    learned_from: "batch_1_2025-03-29"

  - match: { merchant_contains: "magazzino" }
    set_category: "Restaurants"
    schedule: personal
    confidence: high
    learned_from: "batch_1_2025-03-29"

  - match: { merchant_contains: "maizaj" }
    set_category: "Restaurants"
    schedule: personal
    confidence: high
    learned_from: "batch_1_2025-03-29"

  - match: { merchant_contains: "senkaa" }
    set_category: "Restaurants"
    schedule: personal
    confidence: high
    learned_from: "batch_1_2025-03-29"

  - match: { merchant_contains: "cherryhogg" }
    set_category: "Pets"
    schedule: personal
    confidence: high
    learned_from: "batch_1_2025-03-29"

  # Batch 2-6 rules (2025-03-29)
  - match: { merchant_contains: "soho ludlow" }
    set_category: "Entertainment & Recreation"
    schedule: personal
    confidence: high
    note: "Social club dues — nondeductible under TCJA. Meals there ARE deductible separately."
    learned_from: "batch_fixes_2025-03-29"

  - match: { merchant_contains: "izlah" }
    set_category: "Restaurants"
    schedule: personal
    confidence: high
    learned_from: "batch_5_2025-03-29"

  - match: { merchant_contains: "goldman sachs", category_is: "Financial & Legal Services" }
    set_category: "Transfer"
    schedule: personal
    confidence: high
    note: "GS transfers to personal savings, not advisory fees"
    learned_from: "batch_4_2025-03-29"

  - match: { merchant_contains: "amex airline fee" }
    set_category: "Credit Card Annual Fees"
    schedule: schedule_c_credit_card_fees
    confidence: high
    note: "Offsets business card annual fee costs"
    learned_from: "batch_fixes_2025-03-29"
  # Aaron review corrections — 2026-03-29
  # Positive inflows are NOT always income. Refunds, loans, and accidental
  # payments need context (account type, merchant history) to classify correctly.

  - match: { merchant_contains: "airbnb", amount_positive: true, account_contains: "Citi" }
    set_category: "Airbnb Stay"
    schedule: personal
    confidence: high
    note: "Airbnb on personal credit cards = refund/credit, not rental income. Rental income is ProPay only."
    learned_from: "corrections_aaron_review_2026-03-29"

  - match: { merchant_contains: "citibank", amount_positive: true }
    set_category: "Transfer"
    schedule: personal
    confidence: medium
    note: "Citibank inflows to personal accounts are transfers/loans, not income"
    learned_from: "corrections_aaron_review_2026-03-29"

  - match: { merchant_contains: "barra grana" }
    set_category: "Restaurants"
    schedule: personal
    confidence: high
    note: "Mexico City restaurant, not a business expense"
    learned_from: "corrections_aaron_review_2026-03-29"
