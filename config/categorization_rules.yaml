# Categorization rules for Monarch Money transactions.
# Used by execution/finance/categorize.py during /train-categories skill.
# Rules are applied in order — first match wins.
# New rules are appended by the training loop as Aaron provides feedback.

# --- Tax schedule mappings (category name → schedule) ---
# These map Monarch categories to IRS tax schedules for the CPA summary.

schedule_map:
  # Schedule E — Rental property (1771 11th Ave)
  schedule_e:
    - "Rental Income"
    - "Mortgage"
    - "Property Tax"
    - "1771 - Water"
    - "1771 - Trash"
    - "1771 - Maintenance "
    - "1771 - Software"
    - "1771 - Insurance"
    - "1771 - Advertising"
    - "1771 - Lawn & Garden"
    - "1771 - Management"
    - "1771 - Security Deposit"
    - "1771 - Gas"
    - "140 - Maintenance"
    - "140 - Contractor"
    - "140 - Furniture & Housewares"
    - "140 - Design"

  # Schedule C — Business expenses
  schedule_c:
    - "Office Supplies"
    - "Cell Phone"
    - "Dues & Subscriptions"
    - "Software"
    - "Business Utilities & Communication"
    - "Business Services"
    - "Business Income"
    - "Postage & Shipping"
    - "Advertising & Promotion"
    - "Employee Wages & Contract Labor"
    - "Office Rent"
    - "Keynote - Software"
    - "Keynote - Other"
    - "Keynote - Real Estate"
    - "Keynote - Professional Services"
    - "Keynote - Taxes"
    - "Itero - Software"
    - "Itero - Professional Services"
    - "Itero - Travel"
    - "Itero - Restaurants"
    - "Itero - Capital Contribution"
    - "Itero - Tax & Registration"
    - "Itero - Alan PMT"
    - "Palisades Labs - Software"

  # Self-employed deductions (Form 1040, Schedule 1)
  self_employed_deduction:
    - "Health Insurance"

  # Credit card annual fees: AMEX reimbursements net to zero against actual fees.
  # Not relevant for CPA — excluded from triage dashboard.
  # schedule_c_credit_card_fees:
  #   - "Credit Card Annual Fees"

  # Business meals (50% deductible)
  schedule_c_meals:
    - "Business Travel & Meals"

  # Schedule C — Home office
  schedule_c_home_office:
    - "Rent"
    - "Internet & Cable"
    - "Gas & Electric"

  # Estimated tax payments (includes both payments AND refunds — they net out)
  # The IRS refund in 2025 ($16,336.11) is correctly here; it offsets actual payments.
  estimated_payments:
    - "Federal Tax"

  # Reference — CPA needs for reconciliation
  # NOTE: "Airbnb Income" removed — the only Airbnb inflow in 2025 was a refund,
  # not rental income. Rental income comes through ProPay only.
  # NOTE: "Keynote Income" is here, NOT in Schedule C. Keynote is a passthrough LLC —
  # distributions flow through the K-1. These Monarch transactions are just the bank
  # deposits of those distributions. CPA reconciles against the K-1, not these.
  reference:
    - "Interest Income"
    - "Other Income"
    - "Keynote Income"

  # Personal — excluded from tax package
  personal:
    - "Credit Card Annual Fees"
