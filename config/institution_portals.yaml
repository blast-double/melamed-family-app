# --- Self-prepared: Monarch Money export instructions ---

monarch_money_export:
  portal_url: "https://app.monarchmoney.com/transactions"
  click_path:
    - "Log in to app.monarchmoney.com"
    - "Go to Transactions"
    - "Use filters to set the category and date range (Jan 1 - Dec 31 of the tax year)"
