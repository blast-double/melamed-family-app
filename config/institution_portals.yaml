schwab_brokerage:
  portal_url: "https://client.schwab.com/app/accounts/statements-tax-forms"
  click_path:
    - "Log in to schwab.com"
    - "Select Accounts → Statements & Tax Forms"
    - "Tax forms appear in the dashboard as they become available"
    - "Filter by Tax Forms and select the tax year"
    - "Download 1099 Composite and Year-End Summary (PDF)"
  expected_format: "PDF"
  last_verified: "2026-03-27"

