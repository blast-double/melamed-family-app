# Last Updated: 2026-03-29
#
# Aaron's Monarch Money auto-categorization rules.
# Extracted from Monarch Settings > Rules (204 total).
# These represent Aaron's explicit intent for how transactions should be categorized.
# Used by the categorization engine as Signal 2 (highest confidence after merchant history).
#
# Format mirrors Monarch's rule structure:
#   match_type: "contains" or "exactly_matches"
#   match_value: string or list of strings (OR logic)
#   conditions: optional additional filters (debit amount, account, category)
#   actions: recategorize, rename, add_tag, hide

rules:
